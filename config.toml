[[params.services]]
name        = "Direct Metal Printing"
description = "18K yellow, white, and rose gold; sterling silver 925; platinum 950 — printed directly via SLM. Surface finish Ra 3–5µm as-printed, mirror polish on request."
icon        = "⚙️"
image       = "https://images.unsplash.com/photo-1652888510609-ed2d2ad64d6b?w=800&q=80"

[[params.services]]
name        = "End-to-End Production"
description = "Full-service from CAD through casting or direct print to setting, stone-setting, polishing, and hallmarking. Prototype to production volumes from one source."
icon        = "💎"
image       = "https://images.unsplash.com/photo-1692593805406-3ee865740c98?w=800&q=80"

